# =============================================================================
# GitHub Actions CI/CD Pipeline
# =============================================================================
# This workflow handles:
# 1. Testing - Run tests for all services
# 2. Building - Build and push Docker images to GitHub Container Registry
# 3. Deploying - Deploy to DigitalOcean droplet
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ===========================================================================
  # BUILD WINDOWS DESKTOP APP (only when desktop-app/ files change)
  # ===========================================================================
  check-desktop-changes:
    name: Check Desktop App Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            desktop:
              - 'desktop-app/**'

  build-desktop-app:
    name: Build Windows Desktop App
    runs-on: windows-latest
    needs: check-desktop-changes
    if: needs.check-desktop-changes.outputs.changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: desktop-app/requirements.txt

      - name: Install dependencies
        run: |
          cd desktop-app
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create icon
        run: |
          cd desktop-app
          python create_icon.py

      - name: Build executable
        run: |
          cd desktop-app
          pyinstaller --onefile --noconsole --name "JWhiteEmployeeStatus" --icon "icon.ico" --add-data "icon.ico;." --hidden-import=pystray._win32 --hidden-import=PIL._tkinter_finder employee_status_app.py

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app
          path: desktop-app/dist/JWhiteEmployeeStatus.exe
          retention-days: 90

  # ===========================================================================
  # TEST
  # ===========================================================================
  test:
    name: Test Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test-service dependencies
        run: |
          cd services/test-service
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          cd services/test-service
          pytest tests/ -v || echo "No tests yet - skipping"
        continue-on-error: true  # Remove once tests are written

  # ===========================================================================
  # BUILD (parallel matrix strategy with Docker layer caching)
  # ===========================================================================
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: test-service
            context: ./services/test-service
            dockerfile: ./services/test-service/Dockerfile
          - service: ringcentral-service
            context: ./services/ringcentral-service
            dockerfile: ./services/ringcentral-service/Dockerfile
          - service: workflow-service
            context: .
            dockerfile: ./services/workflow-service/Dockerfile
          - service: storage-service
            context: ./services/storage-service
            dockerfile: ./services/storage-service/Dockerfile
          - service: agencyzoom-service
            context: ./services/agencyzoom-service
            dockerfile: ./services/agencyzoom-service/Dockerfile
          - service: dashboard-service
            context: .
            dockerfile: ./services/dashboard-service/Dockerfile
          - service: deputy-service
            context: .
            dockerfile: ./services/deputy-service/Dockerfile
          - service: pipeline-dashboard
            context: ./services/pipeline-dashboard
            dockerfile: ./services/pipeline-dashboard/Dockerfile
          - service: transcription-service
            context: ./services/transcription-service
            dockerfile: ./services/transcription-service/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:buildcache,mode=max

  # ===========================================================================
  # DEPLOY
  # ===========================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://jwhitezaps.atoaz.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if desktop app artifact exists
        id: desktop-check
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const found = artifacts.data.artifacts.some(a => a.name === 'desktop-app');
            core.setOutput('exists', found.toString());

      - name: Download desktop app artifact
        if: steps.desktop-check.outputs.exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: desktop-app
          path: ./desktop-app-dist

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,grafana/"
          target: "~/app"

      - name: Copy desktop app to server
        if: steps.desktop-check.outputs.exists == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "desktop-app-dist/JWhiteEmployeeStatus.exe"
          target: "~/app/downloads"
          strip_components: 1

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            cd ~/app

            # Ensure Loki Docker logging plugin is installed
            docker plugin install grafana/loki-docker-driver:latest --alias loki --grant-all-permissions 2>/dev/null || docker plugin enable loki 2>/dev/null || true

            # Log in to GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images WHILE services are still running
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull --quiet

            # Recreate all containers with latest images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate --remove-orphans --quiet-pull

            # Cleanup old images
            docker image prune -f
