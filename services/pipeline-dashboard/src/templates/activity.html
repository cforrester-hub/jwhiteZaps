{% extends "base.html" %}
{% block title %}Activity Summary - Pipeline Dashboard{% endblock %}
{% block body %}
<div class="activity-page">
    <!-- Top nav bar -->
    <nav class="nav-bar">
        <div class="nav-left">
            <h1 class="nav-title">Pipeline Dashboard</h1>
            <div class="nav-links">
                <a href="/pipeline/" class="nav-link">Pipeline Board</a>
                <a href="/pipeline/activity" class="nav-link active">Activity Summary</a>
            </div>
        </div>
        <div class="nav-center"></div>
        <div class="nav-right">
            <span class="user-name">{{ user.display_name }}</span>
            <form action="/pipeline/api/logout" method="post" style="display:inline;">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <!-- Filter bar -->
    <div class="activity-filters">
        <button class="date-preset active" data-preset="today" onclick="setPreset(this)">Today</button>
        <button class="date-preset" data-preset="yesterday" onclick="setPreset(this)">Yesterday</button>
        <button class="date-preset" data-preset="this_week" onclick="setPreset(this)">This Week</button>
        <button class="date-preset" data-preset="custom" onclick="setPreset(this)">Custom</button>

        <div class="custom-dates" id="custom-date-inputs" style="display:none;">
            <label>From</label>
            <input type="date" id="date-from" onchange="onCustomDateChange()">
            <label>To</label>
            <input type="date" id="date-to" onchange="onCustomDateChange()">
        </div>

        <div style="width:1px; height:24px; background:#3a3f5c; margin:0 4px;"></div>

        <label style="color:#888; font-size:12px;">Producer</label>
        <select id="producer-select" class="pipeline-select" style="min-width:160px; font-size:13px; padding:5px 10px;" onchange="reloadAll()">
            <option value="">All Producers</option>
            {% for producer in producers %}
            <option value="{{ producer.firstname }}">{{ producer.firstname }} {{ producer.lastname }}</option>
            {% endfor %}
        </select>

        <label style="color:#888; font-size:12px;">Pipeline</label>
        <select id="pipeline-select" class="pipeline-select" style="min-width:180px; font-size:13px; padding:5px 10px;" onchange="reloadAll()">
            <option value="">All Pipelines</option>
            {% for pipeline in pipelines %}
            <option value="{{ pipeline.name }}">{{ pipeline.name }}</option>
            {% endfor %}
        </select>

        <div class="prompt-library" id="prompt-library">
            <button class="btn-prompt-library" onclick="togglePromptMenu(event)">Analysis Prompts</button>
            <div class="prompt-menu" id="prompt-menu">
                <!-- Categories and options populated by JS -->
            </div>
        </div>
    </div>

    <!-- HTMX content sections -->
    <div class="activity-content">
        <!-- Summary cards -->
        <div class="activity-section">
            <h2>Team Overview</h2>
            <div id="activity-summary"
                 hx-get="/pipeline/api/activity/summary"
                 hx-trigger="load"
                 hx-swap="innerHTML"
                 hx-indicator="#loading-summary">
                <div class="no-data">Loading...</div>
            </div>
            <div id="loading-summary" class="htmx-indicator activity-loading">
                <div class="loading-bar" style="margin-top:8px;"></div>
            </div>
        </div>

        <!-- New leads by pipeline -->
        <div class="activity-section">
            <h2>New Leads by Pipeline</h2>
            <div id="activity-new-leads"
                 hx-get="/pipeline/api/activity/new-leads"
                 hx-trigger="load"
                 hx-swap="innerHTML"
                 hx-indicator="#loading-new-leads">
                <div class="no-data">Loading...</div>
            </div>
            <div id="loading-new-leads" class="htmx-indicator activity-loading">
                <div class="loading-bar" style="margin-top:8px;"></div>
            </div>
        </div>

        <!-- Producer activity -->
        <div class="activity-section">
            <h2>Producer Activity</h2>
            <div id="activity-producers"
                 hx-get="/pipeline/api/activity/producers"
                 hx-trigger="load"
                 hx-swap="innerHTML"
                 hx-indicator="#loading-producers">
                <div class="no-data">Loading...</div>
            </div>
            <div id="loading-producers" class="htmx-indicator activity-loading">
                <div class="loading-bar" style="margin-top:8px;"></div>
            </div>
        </div>

    </div>
</div>

<script>
    const filterState = {
        preset: 'today',
        date_from: '',
        date_to: '',
        producer: '',
    };

    function todayStr() {
        return new Date().toISOString().slice(0, 10);
    }

    function yesterdayStr() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        return d.toISOString().slice(0, 10);
    }

    function weekStartStr() {
        const d = new Date();
        const day = d.getDay(); // 0=Sun
        const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Mon
        const mon = new Date(d);
        mon.setDate(diff);
        return mon.toISOString().slice(0, 10);
    }

    function resolveDates() {
        switch (filterState.preset) {
            case 'today':
                return { date_from: todayStr(), date_to: todayStr() };
            case 'yesterday':
                return { date_from: yesterdayStr(), date_to: yesterdayStr() };
            case 'this_week':
                return { date_from: weekStartStr(), date_to: todayStr() };
            case 'custom':
                return { date_from: filterState.date_from, date_to: filterState.date_to };
            default:
                return { date_from: todayStr(), date_to: todayStr() };
        }
    }

    function buildParams() {
        const { date_from, date_to } = resolveDates();
        const producer = document.getElementById('producer-select').value;
        const pipeline = document.getElementById('pipeline-select').value;
        const params = new URLSearchParams();
        params.set('preset', filterState.preset);
        if (date_from) params.set('date_from', date_from);
        if (date_to) params.set('date_to', date_to);
        if (producer) params.set('producer', producer);
        if (pipeline) params.set('pipeline_name', pipeline);
        return params.toString();
    }

    function setPreset(btn) {
        document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterState.preset = btn.dataset.preset;

        const customInputs = document.getElementById('custom-date-inputs');
        customInputs.style.display = filterState.preset === 'custom' ? 'flex' : 'none';

        if (filterState.preset !== 'custom') {
            reloadAll();
        }
    }

    function onCustomDateChange() {
        filterState.date_from = document.getElementById('date-from').value;
        filterState.date_to = document.getElementById('date-to').value;
        if (filterState.date_from && filterState.date_to) {
            reloadAll();
        }
    }

    function reloadAll() {
        const qs = buildParams();
        const sections = [
            ['activity-summary', '/pipeline/api/activity/summary'],
            ['activity-new-leads', '/pipeline/api/activity/new-leads'],
            ['activity-producers', '/pipeline/api/activity/producers'],
        ];
        sections.forEach(function(s) {
            var el = document.getElementById(s[0]);
            if (!el) return;
            var url = s[1] + '?' + qs;
            el.textContent = 'Loading...';
            fetch(url, {credentials: 'same-origin'})
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    el.outerHTML = '<div id="' + s[0] + '">' + html + '</div>';
                })
                .catch(function() {
                    el.textContent = 'Failed to load.';
                });
        });
    }

    // ===== Prompt Library =====
    {% raw %}
    const promptLibrary = [
        {
            category: 'Daily',
            prompts: [
                {
                    id: 'coaching_analysis',
                    label: 'Coaching Analysis',
                    desc: 'Producer coaching opportunities',
                    template: "Perform a coaching analysis for the Jennifer White Insurance Agency.\n\nScope:\n  Period: {{dateScope}}\n  Producer: {{producerScope}}\n  Pipeline: {{pipelineScope}}\n\nUse the MCP tools to pull the relevant data for this scope. Analyze each producer\u2019s activity and identify coaching opportunities.\n\nFor each producer, evaluate:\n1. Speed to contact \u2014 are leads being contacted quickly enough?\n2. Quote conversion \u2014 are contacted leads being quoted?\n3. Follow-up discipline \u2014 are quoted leads being followed up on?\n4. Untouched leads \u2014 are there leads sitting with no activity?\n5. Pipeline hygiene \u2014 are leads in the correct stage/status?\n\nBe direct and specific. Name the producer, name the issue, and recommend specific actions for tomorrow."
                },
                {
                    id: 'daily_producer_accountability',
                    label: 'Producer Accountability',
                    desc: 'Daily producer review with action items',
                    template: "Perform a daily producer accountability review for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producer: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to pull the relevant data for this scope.\n\nFor this producer or producer group, evaluate:\n1. Leads worked during the period\n2. New leads received\n3. Speed to first contact\n4. Quote activity\n5. Follow-up activity on quoted leads\n6. Untouched leads\n7. Pipeline hygiene issues\n8. Top 3 coaching priorities for tomorrow\n\nBe direct and specific. Name the issue, name the lead when relevant, and recommend exact actions for the next workday.\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Separate in-period activity from lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'team_daily_standup',
                    label: 'Team Stand-up',
                    desc: 'Team summary with rankings',
                    template: "Create a team daily stand-up report for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to summarize:\n1. Leads worked by producer\n2. New leads assigned by producer\n3. Contact rate by producer\n4. Quote rate by producer\n5. Quoted leads needing follow-up\n6. Untouched new leads by producer\n7. Any major pipeline hygiene issues\n\nThen rank:\n- Best activity discipline\n- Best quote discipline\n- Biggest coaching concern\n\nBe concise and manager-ready. Focus on what I should address with the team tomorrow.\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'manager_tomorrow_plan',
                    label: 'Manager Tomorrow Plan',
                    desc: 'Actionable management agenda',
                    template: "Based on the agency's current pipeline, tell me exactly what management should do tomorrow.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to identify:\n1. Producers who need coaching tomorrow\n2. Leads that need immediate rescue\n3. Pipelines with compliance risk\n4. Quoted deals at risk of dying\n5. Vendor or source issues that need attention\n\nThen give me:\n- A coaching agenda\n- A producer-by-producer action list\n- A recovery list of leads to work first\n- A short end-of-day management checklist\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                }
            ]
        },
        {
            category: 'Lead Analysis',
            prompts: [
                {
                    id: 'internet_lead_handling_audit',
                    label: 'Internet Lead Audit',
                    desc: 'Speed-to-contact and handling review',
                    template: "Perform an internet lead handling audit for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools and evaluate:\n1. Speed to first contact\n2. Number of touch attempts per lead in first 48 hours\n3. Multi-channel usage (call, text, email)\n4. Contact-to-quote conversion\n5. Leads with zero meaningful activity\n6. Producers who are working the leads well versus producers who are underworking them\n\nSeparate lead quality problems from producer effort problems.\nBe direct. Tell me which producer needs coaching, what behavior needs to change, and what good should have looked like.\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'lead_source_quality',
                    label: 'Lead Source Quality',
                    desc: 'Source ROI and conversion analysis',
                    template: "Analyze lead source quality for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to evaluate each lead source on:\n1. Leads entered\n2. Contact rate\n3. Quote rate\n4. Close rate\n5. Contact-to-quote conversion\n6. Quoted-to-won conversion\n7. Bundle rate where applicable\n\nThen answer:\n- Which sources are producing the best leads?\n- Which sources are creating volume but weak conversion?\n- Which sources appear to have a lead quality issue versus a producer execution issue?\n- Which sources should we scale, watch, or cut?\n\nMake the output decision-oriented, not just descriptive.\n\nImportant:\n- Separate lead quality issues from producer execution issues\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'lead_aging_backlog',
                    label: 'Lead Aging & Backlog',
                    desc: 'Stale leads and backlog review',
                    template: "Perform a lead aging and backlog review for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to identify:\n1. New leads aging 0-1, 2-3, 4-7, 8-14, and 15+ days\n2. Backlog by producer\n3. Stale leads still sitting in NEW\n4. Pipelines where aging is worst\n5. Whether backlog appears to be a lead load problem or a follow-up discipline problem\n\nThen recommend:\n- Which producer needs help\n- Which backlog should be reassigned or cleaned up\n- What tomorrow's priority should be\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                }
            ]
        },
        {
            category: 'Pipeline',
            prompts: [
                {
                    id: 'high_intent_quote_compliance',
                    label: 'Quote Compliance Audit',
                    desc: 'High-intent pipeline quote rates',
                    template: "Audit quote compliance for high-intent pipelines at the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to determine:\n1. Total high-intent leads by producer\n2. How many were quoted\n3. Quote compliance rate by producer\n4. Unquoted leads that should have been quoted\n5. Any operational excuses documented in notes\n\nFlag any producer under the expected standard.\nBe blunt and operational. Tell me exactly where compliance is failing and which leads require immediate recovery.\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'post_quote_leakage',
                    label: 'Post-Quote Leakage',
                    desc: 'Quoted leads that did not close',
                    template: "Analyze post-quote leakage for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to identify:\n1. How many leads were effectively quoted\n2. How many did not close\n3. Leakage rate by producer\n4. Recoverable quoted leads\n5. Common loss reasons based on notes\n6. Cases where follow-up discipline appears weak\n\nSeparate controllable losses from uncontrollable losses.\nThen recommend:\n- Which leads should be worked first\n- Which producer habits need coaching\n- What message angle should be used on recoverable deals\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'pipeline_hygiene',
                    label: 'Pipeline Hygiene',
                    desc: 'Stage/status discipline review',
                    template: "Run a pipeline hygiene and discipline review for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to find:\n1. Leads stuck in NEW too long\n2. Quoted leads in the wrong stage or status\n3. Won leads without quotes\n4. Timeline anomalies\n5. Missing contact dates where activity suggests contact occurred\n6. Missing or misleading task data\n\nPrioritize the issues by operational risk.\nTell me what is a true producer issue versus a data integrity issue versus an MCP or system issue.\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'cross_sell_execution',
                    label: 'Cross-Sell Execution',
                    desc: 'Cross-sell opportunity conversion',
                    template: "Analyze cross-sell opportunity execution for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to evaluate:\n1. Leads entered\n2. Contact rate\n3. Quote rate\n4. Close rate\n5. Follow-up cadence\n6. Whether producers are calling before or instead of relying only on email\n\nThen tell me:\n- Who is best at cross-sell conversion\n- Who is underworking the book\n- Which habits should be standardized across the team\n- What should be coached immediately\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'reshop_rewrite',
                    label: 'ReShop/ReWrite Review',
                    desc: 'Retention and recapture performance',
                    template: "Review ReShop/ReWrite pipeline performance for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to analyze:\n1. Volume worked\n2. Quotes produced\n3. Follow-up cadence\n4. Conversion outcomes\n5. Leads near decision point that need immediate attention\n\nFocus on retention and recapture opportunities.\nTell me where money is sitting in the pipeline and which accounts should be worked first.\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                }
            ]
        },
        {
            category: 'Performance',
            prompts: [
                {
                    id: 'producer_scorecard',
                    label: 'Producer Scorecard',
                    desc: 'KPI summary with team rank',
                    template: "Build a producer scorecard for the Jennifer White Insurance Agency.\n\nScope:\n- Producer: {{producerScope}}\n- Period: {{dateScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to summarize:\n1. Quote rate\n2. Close rate\n3. Contact rate\n4. Average speed to quote\n5. Post-quote leakage\n6. Performance by pipeline\n7. Team rank for each KPI\n\nThen give me:\n- What this producer is doing well\n- What is limiting production\n- The top 3 coaching priorities\n- A simple target plan for improvement\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'producer_behavior_comparison',
                    label: 'Behavior Comparison',
                    desc: 'Compare producer work patterns',
                    template: "Compare producer behavior patterns at the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to compare:\n1. Speed to first contact\n2. Number of attempts in first 48 hours\n3. Use of call, text, and email\n4. Contact-to-quote conversion\n5. Quote-to-close conversion\n\nShow me which producer behaviors correlate with better outcomes.\nThen recommend the standard operating playbook the whole team should follow.\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'task_workload',
                    label: 'Task Workload',
                    desc: 'Open/overdue tasks and follow-up gaps',
                    template: "Review task workload and follow-up discipline for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to identify:\n1. Open tasks by producer\n2. Overdue tasks by producer\n3. Quoted leads with pending follow-up tasks\n4. New leads without a next task\n5. Any signs that task data may be incomplete\n\nThen tell me:\n- Who is overloaded\n- Who is under-following\n- Which tasks need to be worked first today\n- What management action I should take\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                }
            ]
        },
        {
            category: 'Executive',
            prompts: [
                {
                    id: 'executive_summary',
                    label: 'Executive Summary',
                    desc: 'High-level agency overview',
                    template: "Create an executive summary for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to summarize:\n1. Lead volume\n2. Contact rate\n3. Quote rate\n4. Close rate\n5. Best and worst lead sources\n6. Best and worst producer trends\n7. Compliance risks\n8. Recoverable revenue opportunities\n\nThen tell me:\n- What improved\n- What got worse\n- Where management should focus next\n- The top 5 actions to improve production\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'recoverable_revenue',
                    label: 'Recoverable Revenue',
                    desc: 'Quoted leads that can be rescued',
                    template: "Identify recoverable revenue opportunities for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producers: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nUse the MCP tools to find:\n1. Quoted but not won leads\n2. Leads with recent activity that are still recoverable\n3. Leads lost due to weak follow-up versus price versus no market\n4. The best reactivation targets\n\nGive me:\n- A ranked recovery list\n- The reason each lead is recoverable\n- Which producer should own the follow-up\n- The suggested next message angle\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                },
                {
                    id: 'data_integrity_audit',
                    label: 'Data Integrity Audit',
                    desc: 'Validate MCP data quality',
                    template: "Run a data integrity audit on the MCP results for the Jennifer White Insurance Agency.\n\nScope:\n- Period: {{dateScope}}\n- Producer: {{producerScope}}\n- Pipeline: {{pipelineScope}}\n\nValidate whether the returned activity metrics are truly scoped to the requested period.\n\nSpecifically check:\n1. Whether total calls, emails, and texts appear to be lifetime totals instead of in-period totals\n2. Whether contact_date aligns with call activity\n3. Whether coaching flags conflict with notes\n4. Whether task counts appear incomplete due to API limitations\n5. Which metrics are safe to trust versus unsafe to trust\n\nDo not just summarize the data. Audit the quality of the data and tell me what appears to be an MCP issue versus a producer issue.\n\nImportant:\n- Focus on activity performed within the scoped period, not lifetime lead history\n- Flag any MCP data inconsistencies clearly"
                }
            ]
        }
    ];
    {% endraw %}

    function resolveScope() {
        const { date_from, date_to } = resolveDates();
        const producer = document.getElementById('producer-select').value;
        const pipeline = document.getElementById('pipeline-select').value;
        const dateScope = date_from === date_to ? date_from : date_from + ' to ' + date_to;
        const producerScope = producer || 'All producers';
        const pipelineScope = pipeline || 'All pipelines';
        return { dateScope, producerScope, pipelineScope };
    }

    function generatePrompt(templateId) {
        const scope = resolveScope();
        let template = null;
        for (const cat of promptLibrary) {
            for (const p of cat.prompts) {
                if (p.id === templateId) { template = p.template; break; }
            }
            if (template) break;
        }
        if (!template) return;

        const text = template
            .replace(/\{\{dateScope\}\}/g, scope.dateScope)
            .replace(/\{\{producerScope\}\}/g, scope.producerScope)
            .replace(/\{\{pipelineScope\}\}/g, scope.pipelineScope);

        navigator.clipboard.writeText(text).then(function() {
            const btn = document.querySelector('.btn-prompt-library');
            const menu = document.getElementById('prompt-menu');
            menu.classList.remove('open');
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() {
                btn.textContent = 'Analysis Prompts';
                btn.classList.remove('copied');
            }, 2000);
        }).catch(function() {
            alert('Copy failed. Please copy manually.');
        });
    }

    function togglePromptMenu(event) {
        event.stopPropagation();
        var menu = document.getElementById('prompt-menu');
        menu.classList.toggle('open');
    }

    // Build prompt menu on load
    (function buildPromptMenu() {
        var menu = document.getElementById('prompt-menu');
        if (!menu) return;
        var html = '';
        promptLibrary.forEach(function(cat) {
            html += '<div class="prompt-category">' + cat.category + '</div>';
            cat.prompts.forEach(function(p) {
                html += '<div class="prompt-option" onclick="generatePrompt(\'' + p.id + '\')">'
                    + p.label
                    + '<div class="prompt-desc">' + p.desc + '</div>'
                    + '</div>';
            });
        });
        menu.innerHTML = html;
    })();

    // Close prompt menu on outside click
    document.addEventListener('click', function(e) {
        var menu = document.getElementById('prompt-menu');
        var lib = document.getElementById('prompt-library');
        if (menu && lib && !lib.contains(e.target)) {
            menu.classList.remove('open');
        }
    });

    // Initialize custom date inputs to today
    document.addEventListener('DOMContentLoaded', function() {
        const today = todayStr();
        document.getElementById('date-from').value = today;
        document.getElementById('date-to').value = today;
    });
</script>
{% endblock %}
