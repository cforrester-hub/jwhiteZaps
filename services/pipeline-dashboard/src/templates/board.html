{% extends "base.html" %}
{% block title %}{{ user.display_name }} - Pipeline Dashboard{% endblock %}
{% block body %}
<div class="dashboard">
    <!-- Top nav bar -->
    <nav class="nav-bar">
        <div class="nav-left">
            <h1 class="nav-title">Pipeline Dashboard</h1>
        </div>
        <div class="nav-center">
            <select id="pipeline-select" class="pipeline-select" onchange="loadBoard()">
                <option value="all" selected>All Pipelines</option>
                {% for pipeline in pipelines %}
                <option value="{{ pipeline.id }}">{{ pipeline.name }}</option>
                {% endfor %}
            </select>
            <div class="view-toggle">
                <button class="btn-toggle" data-view="my" onclick="switchLeadView('my', this)">My Leads</button>
                <button class="btn-toggle active" data-view="all" onclick="switchLeadView('all', this)">All Leads</button>
            </div>
        </div>
        <div class="nav-right">
            <span class="user-name">{{ user.display_name }}</span>
            <span id="sync-status"
                  hx-get="/pipeline/api/sync-status"
                  hx-trigger="load, every 60s"
                  hx-swap="innerHTML">
            </span>
            <form action="/pipeline/api/logout" method="post" style="display:inline;">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <!-- Loading indicator -->
    <div id="loading" class="htmx-indicator">
        <div class="loading-bar"></div>
    </div>

    <!-- Kanban board container -->
    <div id="kanban-board"
         hx-get="/pipeline/api/board/all?view=all"
         hx-trigger="load"
         hx-swap="innerHTML"
         hx-indicator="#loading">
        {% if not pipelines %}
        <div class="empty-state">
            <p>No pipelines found. Data will appear after the next sync.</p>
        </div>
        {% endif %}
    </div>
</div>

<script>
    let currentLeadView = 'all';

    function switchLeadView(view, btn) {
        currentLeadView = view;
        document.querySelectorAll('[data-view="my"], [data-view="all"]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadBoard();
    }

    function loadBoard() {
        const pipelineId = document.getElementById('pipeline-select').value;
        const url = '/pipeline/api/board/' + pipelineId + '?view=' + currentLeadView;
        htmx.ajax('GET', url, {
            target: '#kanban-board',
            swap: 'innerHTML',
            indicator: '#loading'
        });
    }
</script>
{% endblock %}
