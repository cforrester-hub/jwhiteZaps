{% extends "base.html" %}
{% block title %}Login - Pipeline Dashboard{% endblock %}
{% block body %}
<div class="login-container">
    <div class="login-card">
        <h1>Pipeline Dashboard</h1>
        <p class="login-subtitle">Sign in with your AgencyZoom credentials</p>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form action="/pipeline/api/login" method="post">
            <div class="form-group">
                <label for="username">Email</label>
                <input type="email" id="username" name="username" required
                       placeholder="your@email.com" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       placeholder="Your password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
