<div class="stats-bar">
    <div class="stat-card">
        <div class="stat-value">{{ total_leads }}</div>
        <div class="stat-label">Total Leads</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">${{ "{:,.0f}".format(total_premium) }}</div>
        <div class="stat-label">Total Premium</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">${{ "{:,.0f}".format(avg_premium) }}</div>
        <div class="stat-label">Avg Premium</div>
    </div>
</div>
