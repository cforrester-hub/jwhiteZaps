<div class="stats-bar">
    <div class="stat-card">
        <div class="stat-value">{{ total_leads }}</div>
        <div class="stat-label">Total Leads</div>
    </div>
    {% for pc in pipeline_counts %}
    <div class="stat-card stat-clickable" onclick="document.getElementById('pipeline-{{ pc.id }}').scrollIntoView({behavior: 'smooth', block: 'start'})">
        <div class="stat-value">{{ pc.count }}</div>
        <div class="stat-label">{{ pc.name }}</div>
    </div>
    {% endfor %}
    {% if show_outcomes %}
    <div class="stat-card">
        <span class="stat-value" style="color:#2e7d32">{{ outcome_sold }}</span>
        <span class="stat-label">Sold</span>
    </div>
    <div class="stat-card">
        <span class="stat-value" style="color:#c62828">{{ outcome_dead }}</span>
        <span class="stat-label">Dead</span>
    </div>
    <div class="stat-card">
        <span class="stat-value" style="color:#ef6c00">{{ outcome_expired }}</span>
        <span class="stat-label">Expired</span>
    </div>
    {% endif %}
</div>
